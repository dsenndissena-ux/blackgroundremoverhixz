<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiruz Blackground Remover | Pro Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-card: rgba(255, 255, 255, 0.82);
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-light: rgba(59, 130, 246, 0.08);
      --brand: #0f172a;
      --border: rgba(226, 232, 240, 0.65);
      --glass-border: rgba(255, 255, 255, 0.7);
      --success: #10b981;
      --error: #ef4444;
      --donate: #FFDD00;
      --donate-hover: #FFCC00;
      --shadow: 0 4px 20px rgba(0,0,0,0.04);
      --shadow-hover: 0 12px 32px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 12px;
      --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      animation: pageFadeIn 0.8s ease-out;
    }
    @keyframes pageFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* 🌊 Smooth Animated Background */
    .bg-mesh {
      position: fixed; inset: 0; z-index: -2;
      background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 25%, #f8fafc 50%, #e0f2fe 75%, #ffffff 100%);
      background-size: 400% 400%;
      animation: gradientShift 18s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .bg-blur {
      position: fixed; z-index: -1; inset: 0; pointer-events: none;
    }
    .bg-blur::before, .bg-blur::after {
      content: ''; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35;
    }
    .bg-blur::before { width: 500px; height: 500px; background: #93c5fd; top: -10%; left: -10%; animation: float1 25s infinite ease-in-out; }
    .bg-blur::after { width: 400px; height: 400px; background: #c4b5fd; bottom: -15%; right: -10%; animation: float2 20s infinite ease-in-out; }
    @keyframes float1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(40px, -30px) scale(1.15); } }
    @keyframes float2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-35px, 25px) scale(0.9); } }

    header {
      padding: 1.25rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 20; gap: 1rem; flex-wrap: wrap;
      transition: var(--transition);
    }
    header:hover { background: rgba(255, 255, 255, 0.88); box-shadow: var(--shadow); }

    .logo {
      font-family: 'Syne', sans-serif; font-size: 1.55rem; font-weight: 800;
      color: var(--text-primary); letter-spacing: -0.5px; line-height: 1;
      display: flex; align-items: center; gap: 8px;
    }
    .logo svg { width: 24px; height: 24px; fill: var(--accent); opacity: 0.9; }
    .logo span { background: linear-gradient(135deg, var(--accent), #8b5cf6); -webkit-background-clip: text; background-clip: text; color: transparent; }

    .header-actions { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

    .donate-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--donate); color: var(--text-primary); padding: 0.5rem 1rem;
      border-radius: 10px; font-weight: 600; font-size: 0.85rem; text-decoration: none;
      transition: var(--transition); border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 2px 10px rgba(255, 221, 0, 0.25);
    }
    .donate-btn:hover { background: var(--donate-hover); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(255, 221, 0, 0.35); }
    .donate-btn svg { width: 18px; height: 18px; fill: currentColor; }

    /* 🔀 Layout Toggle */
    .layout-switch {
      display: inline-flex; background: rgba(255,255,255,0.85); border: 1px solid var(--border);
      border-radius: 12px; padding: 4px; gap: 4px; backdrop-filter: blur(10px);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }
    .switch-btn {
      display: flex; align-items: center; gap: 0.35rem; padding: 0.45rem 0.85rem;
      border: none; background: transparent; border-radius: 8px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer; color: var(--text-secondary);
      transition: var(--transition); font-family: inherit; white-space: nowrap;
    }
    .switch-btn:hover:not(.active) { color: var(--text-primary); background: rgba(0,0,0,0.04); }
    .switch-btn.active { background: white; color: var(--text-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.06); transform: scale(1.02); }

    /* 📊 Visitor Counter */
    .visitor-counter {
      display: flex; align-items: center; gap: 0.6rem;
      background: rgba(255,255,255,0.85); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.4rem 0.85rem; font-size: 0.75rem;
      font-weight: 600; backdrop-filter: blur(10px); transition: var(--transition);
      white-space: nowrap; box-shadow: var(--shadow);
    }
    .visitor-counter:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
    .counter-pulse { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }
    .counter-value { font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
    .counter-label { color: var(--text-secondary); font-weight: 500; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.35rem 0.7rem; border-radius: 8px; font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.4px;
      background: rgba(248, 250, 252, 0.9); color: var(--text-secondary);
      border: 1px solid var(--border); backdrop-filter: blur(8px);
    }
    .status-badge.success { background: rgba(16, 185, 129, 0.1); color: var(--success); border-color: rgba(16, 185, 129, 0.3); }
    .status-badge.error { background: rgba(239, 68, 68, 0.1); color: var(--error); border-color: rgba(239, 68, 68, 0.3); }

    .container {
      flex: 1; max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem;
      width: 100%; position: relative; z-index: 1; transition: padding var(--transition);
    }

    .steps-indicator {
      display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2.5rem;
      background: rgba(248, 250, 252, 0.85); width: fit-content; margin-left: auto; margin-right: auto;
      padding: 8px 14px; border-radius: 50px; border: 1px solid var(--border);
      backdrop-filter: blur(8px); transition: opacity var(--transition), transform var(--transition);
    }
    .step {
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 500;
      color: var(--text-secondary); padding: 6px 12px; border-radius: 50px; transition: var(--transition);
    }
    .step.active { background: white; color: var(--text-primary); font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transform: scale(1.05); }
    .step.completed { color: var(--success); }
    .step-num { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; }
    .step.active .step-num { background: var(--accent); color: white; border-color: var(--accent); }
    .step.completed .step-num { background: var(--success); color: white; border-color: var(--success); }

    .workspace { display: grid; gap: 2rem; align-items: start; transition: grid-template-columns var(--transition), gap var(--transition); }

    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius); padding: 3.5rem 2rem;
      text-align: center; background: var(--bg-card); cursor: pointer;
      transition: var(--transition), padding var(--transition); position: relative; overflow: hidden;
      backdrop-filter: blur(12px);
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: rgba(59, 130, 246, 0.04); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .upload-zone svg { width: 52px; height: 52px; margin-bottom: 1rem; color: var(--text-secondary); opacity: 0.7; transition: transform 0.4s ease; }
    .upload-zone:hover svg { transform: translateY(-4px); color: var(--accent); }
    .upload-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    .upload-sub { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .upload-btn {
      background: var(--accent); color: white; padding: 0.8rem 1.8rem; border: none;
      border-radius: 10px; font-weight: 500; cursor: pointer; transition: var(--transition);
      font-family: inherit; font-size: 0.95rem; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    .upload-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4); }

    .preview-area {
      background: var(--bg-card); border-radius: var(--radius); padding: 0.75rem;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      display: none; backdrop-filter: blur(12px); transition: var(--transition);
    }
    .preview-area:hover { box-shadow: var(--shadow-hover); }
    .preview-header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0.5rem; }
    .preview-header h2 { font-size: 0.95rem; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
    #file-name { color: var(--text-secondary); font-size: 0.8rem; font-weight: 400; max-width: 200px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    .canvas-container {
      position: relative; width: 100%; aspect-ratio: 16/10; background: transparent;
      border-radius: var(--radius-sm); overflow: hidden; display: flex; align-items: center;
      justify-content: center; border: 1px solid var(--border);
      transition: min-height var(--transition), aspect-ratio var(--transition);
    }
    .canvas-container::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(45deg, #f1f5f9 25%, transparent 25%), linear-gradient(-45deg, #f1f5f9 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #f1f5f9 75%), linear-gradient(-45deg, transparent 75%, #f1f5f9 75%);
      background-size: 16px 16px; background-position: 0 0, 0 8px, 8px -8px, -8px 0px; opacity: 0.6; z-index: 0;
    }
    #preview-img, #composite-canvas { position: relative; z-index: 1; max-width: 100%; max-height: 100%; object-fit: contain; border-radius: var(--radius-sm); transition: transform 0.3s ease; }
    #preview-img:hover { transform: scale(1.01); }
    #composite-canvas { display: none; }

    .loader {
      position: absolute; display: none; flex-direction: column; align-items: center; gap: 0.75rem;
      background: rgba(255,255,255,0.95); padding: 1.25rem 1.5rem; border-radius: var(--radius-sm);
      z-index: 5; box-shadow: var(--shadow-hover); border: 1px solid var(--border); backdrop-filter: blur(10px);
    }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--bg-secondary); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); }

    .controls { display: flex; flex-direction: column; gap: 1rem; transition: min-width var(--transition); }
    .panel {
      background: var(--bg-card); border-radius: var(--radius); padding: 1.25rem;
      border: 1px solid var(--border); box-shadow: var(--shadow); backdrop-filter: blur(12px);
      transition: padding var(--transition), min-width var(--transition), transform 0.3s ease;
    }
    .panel:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .panel h3 { font-size: 0.9rem; margin-bottom: 0.5rem; font-weight: 600; display: flex; align-items: center; gap: 0.4rem; }
    .panel p { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.5; }

    .action-btn {
      width: 100%; padding: 0.85rem; border: none; border-radius: 12px; font-weight: 500;
      cursor: pointer; transition: var(--transition); display: flex; align-items: center;
      justify-content: center; gap: 0.5rem; font-family: inherit; font-size: 0.9rem; min-height: 46px;
    }
    .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4); }
    .btn-secondary { background: rgba(248, 250, 252, 0.8); color: var(--text-primary); border: 1px solid var(--border); backdrop-filter: blur(6px); }
    .btn-secondary:hover:not(:disabled) { background: rgba(241, 245, 249, 1); transform: translateY(-1px); }
    .btn-success { background: var(--success); color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
    .btn-success:hover:not(:disabled) { background: #059669; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4); }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .bg-section { display: flex; flex-direction: column; gap: 0.75rem; }
    .bg-tabs { display: flex; gap: 4px; background: rgba(248, 250, 252, 0.8); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
    .bg-tab { flex: 1; padding: 0.5rem; background: transparent; border: none; color: var(--text-secondary); border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; min-height: 38px; }
    .bg-tab.active { background: white; color: var(--text-primary); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }

    .bg-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; max-height: 280px; overflow-y: auto; padding-right: 2px; }
    .bg-grid::-webkit-scrollbar { width: 4px; }
    .bg-grid::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .bg-option {
      aspect-ratio: 1; border-radius: 10px; cursor: pointer; position: relative;
      transition: var(--transition); border: 2px solid transparent; overflow: hidden; min-width: 50px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }
    .bg-option:hover { transform: scale(1.03); box-shadow: var(--shadow-hover); }
    .bg-option.selected { border-color: var(--accent); transform: scale(0.98); }
    .bg-option.selected::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.35); color: white; font-size: 1.1rem; font-weight: 600; backdrop-filter: blur(4px); border-radius: 8px; }
    .bg-name { position: absolute; bottom: 0; left: 0; right: 0; padding: 3px; font-size: 0.6rem; text-align: center; background: rgba(255,255,255,0.9); color: var(--text-primary); font-weight: 600; letter-spacing: -0.01em; border-radius: 0 0 8px 8px; }

    .hidden { display: none !important; }

    /* 💻 Laptop Mode */
    .mode-laptop .workspace { grid-template-columns: 1fr 320px; }
    .mode-laptop .steps-indicator { display: flex; opacity: 1; transform: translateY(0); }
    .mode-laptop .container { padding: 2rem 1.5rem; }
    .mode-laptop .upload-zone { padding: 3.5rem 2rem; }
    .mode-laptop .canvas-container { min-height: 300px; aspect-ratio: 16/10; }
    .mode-laptop .controls { min-width: 280px; }
    .mode-laptop .panel { min-width: 280px; }

    /* 📱 Mobile Mode */
    .mode-mobile .workspace { grid-template-columns: 1fr; gap: 1.25rem; }
    .mode-mobile .steps-indicator { display: none; opacity: 0; transform: translateY(-10px); }
    .mode-mobile .header-actions { flex-direction: column; align-items: flex-end; gap: 0.5rem; }
    .mode-mobile .container { padding: 1rem; }
    .mode-mobile .upload-zone { padding: 2rem 1rem; }
    .mode-mobile .canvas-container { min-height: 250px; aspect-ratio: 4/3; }
    .mode-mobile .controls { min-width: unset; width: 100%; }
    .mode-mobile .panel { min-width: unset; padding: 1rem; }
    .mode-mobile .counter-label { display: none; }

    @media (max-width: 640px) {
      .layout-switch { width: 100%; justify-content: center; margin-top: 0.5rem; }
      .switch-btn { flex: 1; justify-content: center; }
      header { padding: 1rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body class="mode-laptop">

  <div class="bg-mesh"></div>
  <div class="bg-blur"></div>

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      <span>Hiruz</span><span style="color: #64748b; font-weight: 400;">Blackground Remover</span>
    </div>
    
    <div class="header-actions">
      <a href="https://buymeacoffee.com/soulrestaudio" target="_blank" rel="noopener noreferrer" class="donate-btn" title="Support this project">
        <svg viewBox="0 0 24 24"><path d="M18.5 3H6c-1.1 0-2 .9-2 2v5.71c0 3.83 2.95 7.18 6.78 7.29 3.96.12 7.22-3.06 7.22-7v-1h.5c1.93 0 3.5-1.57 3.5-3.5S20.43 3 18.5 3zM16 8.99c0 2.2-1.8 3.99-3.99 3.99-2.2 0-4-1.8-4-4V5h8v3.99zm2.5-1.99h-1v-2h1c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5zM7 15v2h2v-2H7zm0 4v2h2v-2H7zm4-4v2h2v-2h-2zm0 4v2h2v-2h-2zm4-4v2h2v-2h-2zm0 4v2h2v-2h-2z"/></svg>
        <span>Buy me a coffee</span>
      </a>

      <div class="layout-switch" id="layout-switch">
        <button class="switch-btn active" data-mode="laptop">💻 Laptop</button>
        <button class="switch-btn" data-mode="mobile">📱 Mobile</button>
      </div>

      <div class="visitor-counter" title="Live Visitors & Total Visits">
        <span class="counter-pulse"></span>
        <span class="counter-value" id="live-count">--</span>
        <span class="counter-label">online</span>
        <span style="color: var(--border);">|</span>
        <span class="counter-value" id="total-count">--</span>
        <span class="counter-label">visits</span>
      </div>

      <div class="status-badge" id="status-badge">Ready</div>
    </div>
  </header>

  <div class="container">
    <div class="steps-indicator" id="steps">
      <div class="step active" id="step-1"><div class="step-num">1</div><span>Upload</span></div>
      <div class="step" id="step-2"><div class="step-num">2</div><span>Remove</span></div>
      <div class="step" id="step-3"><div class="step-num">3</div><span>Customize</span></div>
      <div class="step" id="step-4"><div class="step-num">4</div><span>Export</span></div>
    </div>

    <div class="workspace">
      <main class="main-area">
        <div class="upload-zone" id="upload-zone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          <div class="upload-title">Drop your image here</div>
          <div class="upload-sub">JPG, PNG, WEBP • Max 10MB</div>
          <button class="upload-btn">Browse Files</button>
          <input type="file" id="file-input" accept="image/*" hidden>
        </div>

        <div class="preview-area" id="preview-area">
          <div class="preview-header">
            <h2>Workspace</h2>
            <span id="file-name">image.png</span>
          </div>
          <div class="canvas-container">
            <div class="loader" id="loader">
              <div class="spinner"></div>
              <div class="loader-text">Processing AI...</div>
            </div>
            <img id="preview-img" src="" alt="Preview">
            <canvas id="composite-canvas"></canvas>
          </div>
        </div>
      </main>

      <aside class="controls">
        <div class="panel" id="upload-panel">
          <h3>📸 Input</h3>
          <p>Select a high-resolution photo for optimal processing.</p>
        </div>

        <button class="action-btn btn-primary" id="process-btn" disabled>Remove Blackground</button>

        <div class="panel hidden" id="bg-picker">
          <div class="bg-section">
            <h3 style="justify-content: space-between;">
              <span>🎨 Background</span>
              <button class="action-btn btn-secondary" id="reset-bg-btn" style="padding: 0.25rem 0.6rem; width: auto; font-size: 0.65rem; font-weight: 600;">None</button>
            </h3>
            <div class="bg-tabs">
              <button class="bg-tab active" data-tab="colors">Solids</button>
              <button class="bg-tab" data-tab="gradients">Gradients</button>
              <button class="bg-tab" data-tab="scenes">Scenes</button>
            </div>
            <div class="bg-grid" id="bg-grid"></div>
          </div>
        </div>

        <button class="action-btn btn-success" id="download-btn" disabled>Download Export</button>
        <button class="action-btn btn-secondary" id="reset-btn" style="display: none;">Reset Workspace</button>
      </aside>
    </div>
  </div>

  <script>
    /* 🔀 Layout Switcher */
    (function() {
      const switchEl = document.getElementById('layout-switch');
      const buttons = switchEl.querySelectorAll('.switch-btn');
      const body = document.body;
      const savedMode = localStorage.getItem('hiruz_layout_mode') || 'laptop';
      setLayoutMode(savedMode);
      buttons.forEach(btn => btn.addEventListener('click', () => setLayoutMode(btn.dataset.mode)));
      function setLayoutMode(mode) {
        body.classList.remove('mode-laptop', 'mode-mobile');
        body.classList.add(`mode-${mode}`);
        localStorage.setItem('hiruz_layout_mode', mode);
        buttons.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      }
    })();

    /* 📊 Visitor Counter */
    (function() {
      const liveEl = document.getElementById('live-count');
      const totalEl = document.getElementById('total-count');
      let sessionId = sessionStorage.getItem('sv_sid');
      if (!sessionId) { sessionId = 's_' + Math.random().toString(36).substr(2, 9) + Date.now(); sessionStorage.setItem('sv_sid', sessionId); }
      async function updateTotalVisits() {
        try {
          const res = await fetch('https://api.countapi.xyz/hit/hiruz-bg-remover/visits');
          const data = await res.json();
          totalEl.textContent = (data.value || 0).toLocaleString();
        } catch {
          let local = parseInt(localStorage.getItem('sv_local_visits') || '0') + 1;
          localStorage.setItem('sv_local_visits', local);
          totalEl.textContent = local.toLocaleString();
        }
      }
      let simulatedOnline = 1;
      function updateLiveCount() {
        simulatedOnline = Math.max(1, simulatedOnline + Math.floor(Math.random() * 3) - 1);
        if (simulatedOnline > 15) simulatedOnline = Math.floor(Math.random() * 5) + 1;
        liveEl.textContent = simulatedOnline;
      }
      updateTotalVisits(); updateLiveCount();
      setInterval(updateTotalVisits, 30000); setInterval(updateLiveCount, 10000);
      const beat = setInterval(() => fetch('https://api.countapi.xyz/value/hiruz-bg-remover/online?amount=1'), 15000);
      window.addEventListener('beforeunload', () => clearInterval(beat));
    })();

    /* 🎨 Main App Logic */
    let currentFile = null;
    let foregroundImage = null;
    let selectedBgType = 'none';
    let selectedBgValue = null;
    let currentTab = 'colors';

    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');
    const previewArea = document.getElementById('preview-area');
    const previewImg = document.getElementById('preview-img');
    const fileNameDisplay = document.getElementById('file-name');
    const processBtn = document.getElementById('process-btn');
    const downloadBtn = document.getElementById('download-btn');
    const resetBtn = document.getElementById('reset-btn');
    const loader = document.getElementById('loader');
    const statusBadge = document.getElementById('status-badge');
    const bgPicker = document.getElementById('bg-picker');
    const bgGrid = document.getElementById('bg-grid');
    const compositeCanvas = document.getElementById('composite-canvas');
    const ctx = compositeCanvas.getContext('2d');

    uploadZone.addEventListener('click', () => fileInput.click());
    ['dragenter','dragover','dragleave','drop'].forEach(e => uploadZone.addEventListener(e, e => { e.preventDefault(); e.stopPropagation(); }));
    ['dragenter','dragover'].forEach(e => uploadZone.addEventListener(e, () => uploadZone.classList.add('drag-over')));
    ['dragleave','drop'].forEach(e => uploadZone.addEventListener(e, () => uploadZone.classList.remove('drag-over')));
    uploadZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
    fileInput.addEventListener('change', e => handleFiles(e.target.files));
    processBtn.addEventListener('click', removeBackground);
    downloadBtn.addEventListener('click', downloadFinal);
    resetBtn.addEventListener('click', resetWorkspace);
    document.getElementById('reset-bg-btn').addEventListener('click', () => selectBackground('none', null));

    document.querySelectorAll('.bg-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.bg-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        renderBackgrounds(currentTab);
      });
    });

    function handleFiles(files) {
      if (!files.length) return;
      const file = files[0];
      if (!file.type.startsWith('image/')) { alert('Please upload a valid image.'); return; }
      if (file.size > 10 * 1024 * 1024) { alert('Max file size 10MB.'); return; }
      currentFile = file;
      fileNameDisplay.textContent = file.name;
      uploadZone.classList.add('hidden');
      previewArea.style.display = 'block';
      const reader = new FileReader();
      reader.onload = e => {
        previewImg.src = e.target.result;
        processBtn.disabled = false;
        updateStatus('Loaded', 'default');
        updateSteps(1);
      };
      reader.readAsDataURL(file);
    }

    async function removeBackground() {
      if (!currentFile) return;
      processBtn.disabled = true;
      loader.style.display = 'flex';
      updateStatus('Processing...', 'default');
      const formData = new FormData();
      formData.append('image_file', currentFile);
      formData.append('size', 'auto');
      try {
        const res = await fetch('https://api.remove.bg/v1.0/removebg', {
          method: 'POST',
          headers: { 'X-Api-Key': 'DsU8jeLZp4w2uSayJ9frLLNs' },
          body: formData
        });
        if (!res.ok) throw new Error((await res.json()).errors?.[0]?.title || 'API Failed');
        const blob = await res.blob();
        foregroundImage = new Image();
        foregroundImage.onload = () => {
          previewImg.src = URL.createObjectURL(blob);
          loader.style.display = 'none';
          bgPicker.classList.remove('hidden');
          processBtn.classList.add('hidden');
          downloadBtn.disabled = false;
          resetBtn.style.display = 'flex';
          updateStatus('Complete', 'success');
          updateSteps(2);
          renderBackgrounds('colors');
          selectBackground('none', null);
        };
        foregroundImage.src = URL.createObjectURL(blob);
      } catch (err) {
        loader.style.display = 'none';
        updateStatus('Error', 'error');
        alert('❌ ' + err.message);
        processBtn.disabled = false;
      }
    }

    const backgrounds = {
      colors: [
        { name: 'None', type: 'none', value: null }, { name: 'White', value: '#ffffff' }, { name: 'Black', value: '#111111' }, { name: 'Gray', value: '#d4d4d8' },
        { name: 'Beige', value: '#f5f5dc' }, { name: 'Navy', value: '#0f172a' }, { name: 'Red', value: '#ef4444' }, { name: 'Teal', value: '#14b8a6' },
        { name: 'Purple', value: '#8b5cf6' }, { name: 'Pink', value: '#f43f5e' }, { name: 'Blue', value: '#3b82f6' }, { name: 'Gold', value: '#eab308' }
      ],
      gradients: [
        { name: 'Sunset', value: ['#f9a8d4','#fbbf24'] }, { name: 'Aurora', value: ['#c084fc','#38bdf8'] }, { name: 'Midnight', value: ['#0f172a','#3b82f6'] },
        { name: 'Neon', value: ['#f43f5e','#06b6d4'] }, { name: 'Berry', value: ['#be185d','#9333ea'] }, { name: 'Ocean', value: ['#a5f3fc','#0ea5e9'] },
        { name: 'Peach', value: ['#ffedd5','#fca5a5'] }, { name: 'Cloud', value: ['#f8fafc','#cbd5e1'] }, { name: 'Forest', value: ['#a7f3d0','#059669'] },
        { name: 'Velvet', value: ['#701a75','#f43f5e'] }, { name: 'Charcoal', value: ['#27272a','#52525b'] }, { name: 'Warm', value: ['#fff7ed','#fbbf24'] }
      ],
      scenes: [
        { name: 'Studio', value: 'studio' }, { name: 'Garden', value: 'garden' }, { name: 'Cafe', value: 'cafe' }, { name: 'Beach', value: 'beach' },
        { name: 'City', value: 'city' }, { name: 'Space', value: 'space' }, { name: 'Bokeh', value: 'bokeh' }, { name: 'Wood', value: 'wood' },
        { name: 'Marble', value: 'marble' }, { name: 'Paper', value: 'paper' }, { name: 'Clouds', value: 'clouds' }, { name: 'Dark', value: 'dark' }
      ]
    };

    function renderBackgrounds(tab) {
      bgGrid.innerHTML = '';
      backgrounds[tab].forEach(bg => {
        const div = document.createElement('div');
        div.className = 'bg-option';
        if (selectedBgType === bg.type || (selectedBgValue === bg.value && bg.type !== 'none')) div.classList.add('selected');
        div.dataset.type = bg.type || 'color';
        div.dataset.value = JSON.stringify(bg.value);
        if (bg.value === null) { div.style.background = `linear-gradient(135deg, #f1f5f9 25%, #e2e8f0 25%, #e2e8f0 50%, #f1f5f9 50%, #f1f5f9 75%, #e2e8f0 75%, #e2e8f0 100%)`; div.style.backgroundSize = '20px 20px'; }
        else if (typeof bg.value === 'string' && bg.value.startsWith('#')) { div.style.background = bg.value; }
        else if (Array.isArray(bg.value)) { div.style.background = `linear-gradient(135deg, ${bg.value.join(', ')})`; }
        else { div.style.background = generateSceneBackground(bg.value); }
        const label = document.createElement('span');
        label.className = 'bg-name'; label.textContent = bg.name;
        div.appendChild(label);
        div.addEventListener('click', () => selectBackground(bg.type || 'color', bg.value));
        bgGrid.appendChild(div);
      });
    }

    function generateSceneBackground(type) {
      const scenes = { studio: 'linear-gradient(180deg, #f8fafc 0%, #cbd5e1 100%)', garden: 'linear-gradient(180deg, #bbf7d0 0%, #166534 100%)', cafe: 'linear-gradient(135deg, #d4a373 0%, #faedcd 100%)', beach: 'linear-gradient(180deg, #7dd3fc 0%, #fcd34d 60%, #fff 100%)', city: 'linear-gradient(135deg, #1e293b 0%, #475569 100%)', space: 'radial-gradient(circle, #1e1b4b 0%, #000000 100%)', bokeh: 'radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(100,100,100,0.5) 60%, rgba(24,24,27,1) 100%)', wood: 'repeating-linear-gradient(90deg, #78350f 0%, #92400e 5%, #451a03 10%, #78350f 15%)', marble: 'linear-gradient(45deg, #f8fafc 25%, #e2e8f0 25%, #e2e8f0 50%, #f8fafc 50%, #f8fafc 75%, #e2e8f0 75%)', paper: 'linear-gradient(0deg, #f8fafc 0%, #f1f5f9 100%)', clouds: 'linear-gradient(180deg, #1e293b 0%, #94a3b8 50%, #ffffff 100%)', dark: 'linear-gradient(180deg, #27272a 0%, #09090b 100%)' };
      return scenes[type] || '#e5e7eb';
    }

    function selectBackground(type, value) {
      selectedBgType = type; selectedBgValue = value;
      document.querySelectorAll('.bg-option').forEach(el => {
        el.classList.remove('selected');
        const v = JSON.parse(el.dataset.value);
        if ((type === 'none' && v === null) || (JSON.stringify(v) === JSON.stringify(value))) el.classList.add('selected');
      });
      if (type === 'none' && !foregroundImage) return;
      renderComposite();
      updateSteps(type === 'none' ? 2 : 3);
      updateStatus(type === 'none' ? 'Transparent' : 'Applied', 'success');
    }

    function renderComposite() {
      if (!foregroundImage) return;
      compositeCanvas.width = foregroundImage.naturalWidth;
      compositeCanvas.height = foregroundImage.naturalHeight;
      if (selectedBgType !== 'none') {
        if (typeof selectedBgValue === 'string' && selectedBgValue.startsWith('#')) { ctx.fillStyle = selectedBgValue; ctx.fillRect(0, 0, compositeCanvas.width, compositeCanvas.height); }
        else if (Array.isArray(selectedBgValue)) { const grad = ctx.createLinearGradient(0, 0, compositeCanvas.width, compositeCanvas.height); grad.addColorStop(0, selectedBgValue[0]); grad.addColorStop(1, selectedBgValue[1]); ctx.fillStyle = grad; ctx.fillRect(0, 0, compositeCanvas.width, compositeCanvas.height); }
        else { const colors = { studio: ['#f8fafc','#cbd5e1'], garden: ['#bbf7d0','#166534'], cafe: ['#d4a373','#faedcd'], beach: ['#7dd3fc','#fcd34d'], city: ['#1e293b','#475569'], space: ['#1e1b4b','#000000'], bokeh: ['#ffffff','#52525b'], neon: ['#f43f5e','#06b6d4'], clouds: ['#1e293b','#ffffff'], wood: ['#78350f','#92400e'], marble: ['#f8fafc','#e2e8f0'], paper: ['#f8fafc','#f1f5f9'], dark: ['#27272a','#09090b'] }; const c = colors[selectedBgValue] || ['#ccc','#888']; const grad = ctx.createLinearGradient(0, 0, compositeCanvas.width, compositeCanvas.height); grad.addColorStop(0, c[0]); grad.addColorStop(1, c[1]); ctx.fillStyle = grad; ctx.fillRect(0, 0, compositeCanvas.width, compositeCanvas.height); }
      }
      ctx.drawImage(foregroundImage, 0, 0, compositeCanvas.width, compositeCanvas.height);
      previewImg.classList.add('hidden'); compositeCanvas.style.display = 'block';
      downloadBtn.disabled = false; if (selectedBgType !== 'none') updateSteps(3);
    }

    function downloadFinal() {
      if (!foregroundImage) return; renderComposite();
      const link = document.createElement('a');
      link.download = `Hiruz_${currentFile.name.replace(/\.[^/.]+$/, "")}.png`;
      link.href = compositeCanvas.toDataURL('image/png', 1.0); link.click();
      updateSteps(4); updateStatus('Exported', 'success');
    }

    function resetWorkspace() {
      fileInput.value = ''; currentFile = null; foregroundImage = null; selectedBgType = 'none'; selectedBgValue = null;
      previewImg.src = ''; previewImg.classList.remove('hidden'); compositeCanvas.style.display = 'none';
      uploadZone.classList.remove('hidden'); previewArea.style.display = 'none';
      processBtn.disabled = true; processBtn.classList.remove('hidden'); bgPicker.classList.add('hidden');
      downloadBtn.disabled = true; resetBtn.style.display = 'none';
      updateStatus('Ready', 'default'); updateSteps(1);
    }

    function updateSteps(current) {
      for (let i = 1; i <= 4; i++) {
        const el = document.getElementById(`step-${i}`);
        el.className = 'step';
        if (i < current) el.classList.add('completed');
        if (i === current) el.classList.add('active');
      }
    }

    function updateStatus(text, type) {
      statusBadge.textContent = text; statusBadge.className = 'status-badge';
      if (type === 'success') statusBadge.classList.add('success');
      if (type === 'error') statusBadge.classList.add('error');
    }
  </script>
</body>
</html>
