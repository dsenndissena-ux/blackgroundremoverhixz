<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiruzz BG Remover | Professional AI Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #fdf6f9;
      --bg-secondary: #fff5f8;
      --bg-card: rgba(255, 255, 255, 0.92);
      --text-primary: #2e2d34;
      --text-secondary: #6b7280;
      --accent: #c2419f;
      --accent-hover: #9d2b7e;
      --accent-light: #fce7f3;
      --border: #e9d5f0;
      --success: #059669;
      --error: #dc2626;
      --glass: rgba(255, 245, 250, 0.85);
      --shadow: 0 4px 15px rgba(0,0,0,0.05);
      --shadow-hover: 0 8px 25px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 12px;
      --transition: all 0.15s ease-out;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Static background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(194, 65, 159, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.04) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'Playfair Display', 'Times New Roman', serif;
      font-size: 1.65rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      line-height: 1;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .logo span.highlight {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 900;
    }
    .logo svg { width: 22px; height: 22px; fill: var(--accent); margin-right: 4px; opacity: 0.9; }

    .container {
      flex: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .steps-indicator {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .step:not(:last-child)::after {
      content: '›';
      font-size: 1.2rem;
      margin-left: 1.5rem;
      color: var(--border);
      font-weight: 400;
    }
    .step.active { color: var(--text-primary); font-weight: 600; }
    .step.completed { color: var(--success); }
    .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .step.active .step-num { background: var(--accent); color: white; border-color: var(--accent); }
    .step.completed .step-num { background: var(--success); color: white; border-color: var(--success); }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
      align-items: start;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 3.5rem 2rem;
      text-align: center;
      background: var(--bg-card);
      cursor: pointer;
      transition: var(--transition);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: var(--shadow-hover);
    }
    .upload-zone svg { width: 56px; height: 56px; margin-bottom: 1rem; color: var(--text-secondary); }
    .upload-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-primary); }
    .upload-sub { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .upload-btn {
      background: var(--accent);
      color: white;
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      font-size: 0.95rem;
    }
    .upload-btn:hover { background: var(--accent-hover); }

    .preview-area {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: none;
    }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0 0.25rem;
    }
    .preview-header h2 { font-size: 1rem; font-weight: 600; color: var(--text-primary); }

    .canvas-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/10;
      background: transparent;
      border-radius: var(--radius-sm);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }
    .canvas-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(45deg, #f3e8ff 25%, transparent 25%), 
                        linear-gradient(-45deg, #f3e8ff 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #f3e8ff 75%), 
                        linear-gradient(-45deg, transparent 75%, #f3e8ff 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      opacity: 0.5;
      z-index: 0;
    }

    #preview-img, #composite-canvas {
      position: relative;
      z-index: 1;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: var(--radius-sm);
    }
    #composite-canvas { display: none; }

    .loader {
      position: absolute;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      background: white;
      padding: 1.2rem 2rem;
      border-radius: var(--radius-sm);
      z-index: 5;
      box-shadow: var(--shadow-hover);
    }
    .loader-text { font-size: 0.85rem; font-weight: 600; color: var(--accent); }

    .controls { display: flex; flex-direction: column; gap: 1rem; }
    .panel {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 1.25rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .panel h3 { font-size: 0.95rem; margin-bottom: 0.5rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
    .panel p { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.6; }

    .action-btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: var(--accent-light); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover:not(:disabled) { background: #047857; }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .status-badge.success { background: #ecfdf5; color: #059669; border-color: #a7f3d0; }
    .status-badge.error { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

    .bg-section { display: flex; flex-direction: column; gap: 0.75rem; }
    .bg-tabs { display: flex; gap: 0.5rem; background: var(--bg-secondary); padding: 4px; border-radius: 8px; }
    .bg-tab {
      flex: 1;
      padding: 0.55rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .bg-tab.active { background: white; color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .bg-tab:hover:not(.active) { color: var(--accent); }

    .bg-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      max-height: 300px;
      overflow-y: auto;
      padding: 2px;
    }
    .bg-grid::-webkit-scrollbar { width: 4px; }
    .bg-grid::-webkit-scrollbar-track { background: transparent; }
    .bg-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .bg-option {
      aspect-ratio: 1;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: var(--transition);
      border: 2px solid transparent;
      overflow: hidden;
    }
    .bg-option:hover { box-shadow: var(--shadow-hover); }
    .bg-option.selected { border-color: var(--accent); }
    .bg-option.selected::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      backdrop-filter: blur(2px);
    }
    .bg-name {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 4px;
      font-size: 0.6rem;
      text-align: center;
      background: rgba(255,255,255,0.9);
      color: var(--text-primary);
      font-weight: 500;
    }

    .hidden { display: none !important; }

    @media (max-width: 1000px) {
      .workspace { grid-template-columns: 1fr; }
      .steps-indicator { gap: 1rem; flex-wrap: wrap; }
      .step:not(:last-child)::after { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      Hiruzz <span class="highlight">BG</span>
    </div>
    <div class="status-badge" id="status-badge">Ready</div>
  </header>

  <div class="container">
    <div class="steps-indicator" id="steps">
      <div class="step active" id="step-1"><div class="step-num">1</div><span>Upload</span></div>
      <div class="step" id="step-2"><div class="step-num">2</div><span>Remove BG</span></div>
      <div class="step" id="step-3"><div class="step-num">3</div><span>New BG</span></div>
      <div class="step" id="step-4"><div class="step-num">4</div><span>Download</span></div>
    </div>

    <div class="workspace">
      <main class="main-area">
        <div class="upload-zone" id="upload-zone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          <div class="upload-title">Drop your image here</div>
          <div class="upload-sub">Supports JPG, PNG, WEBP • Max 10MB</div>
          <button class="upload-btn">Browse Files</button>
          <input type="file" id="file-input" accept="image/*" hidden>
        </div>

        <div class="preview-area" id="preview-area">
          <div class="preview-header">
            <h2>Workspace</h2>
            <span id="file-name" style="color: var(--text-secondary); font-size: 0.8rem; font-weight: 500;"></span>
          </div>
          <div class="canvas-container">
            <div class="loader" id="loader">
              <div class="loader-text">Processing...</div>
            </div>
            <img id="preview-img" src="" alt="Preview">
            <canvas id="composite-canvas"></canvas>
          </div>
        </div>
      </main>

      <aside class="controls">
        <div class="panel" id="upload-panel">
          <h3>📸 Upload</h3>
          <p>Select a high-resolution photo for best AI results.</p>
        </div>

        <button class="action-btn btn-primary" id="process-btn" disabled>
          ✨ Remove Background
        </button>

        <div class="panel hidden" id="bg-picker">
          <div class="bg-section">
            <h3 style="justify-content: space-between;">
              <span>🎨 Choose Background</span>
              <button class="action-btn btn-secondary" id="reset-bg-btn" style="padding: 0.3rem 0.7rem; width: auto; font-size: 0.7rem;">None</button>
            </h3>
            <div class="bg-tabs">
              <button class="bg-tab active" data-tab="colors">Solids</button>
              <button class="bg-tab" data-tab="gradients">Gradients</button>
              <button class="bg-tab" data-tab="scenes">Scenes</button>
            </div>
            <div class="bg-grid" id="bg-grid"></div>
          </div>
        </div>

        <button class="action-btn btn-success" id="download-btn" disabled>
          ⬇️ Download Final
        </button>

        <button class="action-btn btn-secondary" id="reset-btn" style="display: none;">
          🔄 Reset
        </button>
      </aside>
    </div>
  </div>

  <script>
    let currentFile = null;
    let foregroundImage = null;
    let selectedBgType = 'none';
    let selectedBgValue = null;
    let currentTab = 'colors';

    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');
    const previewArea = document.getElementById('preview-area');
    const previewImg = document.getElementById('preview-img');
    const fileNameDisplay = document.getElementById('file-name');
    const processBtn = document.getElementById('process-btn');
    const downloadBtn = document.getElementById('download-btn');
    const resetBtn = document.getElementById('reset-btn');
    const loader = document.getElementById('loader');
    const statusBadge = document.getElementById('status-badge');
    const bgPicker = document.getElementById('bg-picker');
    const bgGrid = document.getElementById('bg-grid');
    const compositeCanvas = document.getElementById('composite-canvas');
    const ctx = compositeCanvas.getContext('2d');

    uploadZone.addEventListener('click', () => fileInput.click());
    ['dragenter','dragover','dragleave','drop'].forEach(e => uploadZone.addEventListener(e, preventDefaults));
    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
    ['dragenter','dragover'].forEach(e => uploadZone.addEventListener(e, () => uploadZone.classList.add('drag-over')));
    ['dragleave','drop'].forEach(e => uploadZone.addEventListener(e, () => uploadZone.classList.remove('drag-over')));
    uploadZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
    fileInput.addEventListener('change', e => handleFiles(e.target.files));
    processBtn.addEventListener('click', removeBackground);
    downloadBtn.addEventListener('click', downloadFinal);
    resetBtn.addEventListener('click', resetWorkspace);
    document.getElementById('reset-bg-btn').addEventListener('click', () => selectBackground('none', null));

    document.querySelectorAll('.bg-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.bg-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        renderBackgrounds(currentTab);
      });
    });

    function handleFiles(files) {
      if (!files.length) return;
      const file = files[0];
      if (!file.type.startsWith('image/')) { alert('Please upload a valid image.'); return; }
      if (file.size > 10 * 1024 * 1024) { alert('Max 10MB.'); return; }
      
      currentFile = file;
      fileNameDisplay.textContent = file.name;
      uploadZone.classList.add('hidden');
      previewArea.style.display = 'block';
      
      const reader = new FileReader();
      reader.onload = e => {
        previewImg.src = e.target.result;
        processBtn.disabled = false;
        updateStatus('Loaded', 'default');
        updateSteps(1);
      };
      reader.readAsDataURL(file);
    }

    async function removeBackground() {
      if (!currentFile) return;
      processBtn.disabled = true;
      loader.style.display = 'flex';
      updateStatus('Processing...', 'default');

      const formData = new FormData();
      formData.append('image_file', currentFile);
      formData.append('size', 'auto');

      try {
        const res = await fetch('https://api.remove.bg/v1.0/removebg', {
          method: 'POST',
          headers: { 'X-Api-Key': 'DsU8jeLZp4w2uSayJ9frLLNs' },
          body: formData
        });
        if (!res.ok) throw new Error((await res.json()).errors?.[0]?.title || 'API Failed');
        
        const blob = await res.blob();
        foregroundImage = new Image();
        foregroundImage.onload = () => {
          previewImg.src = URL.createObjectURL(blob);
          loader.style.display = 'none';
          bgPicker.classList.remove('hidden');
          processBtn.classList.add('hidden');
          downloadBtn.disabled = false;
          resetBtn.style.display = 'flex';
          updateStatus('Complete', 'success');
          updateSteps(2);
          renderBackgrounds('colors');
          selectBackground('none', null);
        };
        foregroundImage.src = URL.createObjectURL(blob);
      } catch (err) {
        loader.style.display = 'none';
        updateStatus('Error: ' + err.message, 'error');
        alert('❌ ' + err.message);
        processBtn.disabled = false;
      }
    }

    const backgrounds = {
      colors: [
        { name: 'None', type: 'none', value: null }, { name: 'White', value: '#ffffff' },
        { name: 'Black', value: '#111111' }, { name: 'Blush', value: '#fce7f3' },
        { name: 'Lavender', value: '#e9d5ff' }, { name: 'Mint', value: '#ecfdf5' },
        { name: 'Rose', value: '#e11d48' }, { name: 'Navy', value: '#1e3a8a' },
        { name: 'Charcoal', value: '#374151' }, { name: 'Ivory', value: '#fffbeb' },
        { name: 'Teal', value: '#14b8a6' }, { name: 'Gold', value: '#f59e0b' }
      ],
      gradients: [
        { name: 'Sunset', value: ['#f9a8d4','#fbbf24'] }, { name: 'Aurora', value: ['#c084fc','#38bdf8'] },
        { name: 'Candy', value: ['#fde047','#ec4899'] }, { name: 'Midnight', value: ['#1e1b4b','#4338ca'] },
        { name: 'Peach', value: ['#ffedd5','#fca5a5'] }, { name: 'Ocean', value: ['#a5f3fc','#0ea5e9'] },
        { name: 'Berry', value: ['#fbcfe8','#9333ea'] }, { name: 'Velvet', value: ['#be185d','#f43f5e'] },
        { name: 'Forest', value: ['#a7f3d0','#059669'] }, { name: 'Sky', value: ['#bae6fd','#3b82f6'] },
        { name: 'Cloud', value: ['#f8fafc','#cbd5e1'] }, { name: 'Ember', value: ['#fca5a5','#ea580c'] }
      ],
      scenes: [
        { name: 'Studio', value: 'studio' }, { name: 'Garden', value: 'garden' },
        { name: 'Cafe', value: 'cafe' }, { name: 'Beach', value: 'beach' },
        { name: 'City', value: 'city' }, { name: 'Space', value: 'space' },
        { name: 'Bokeh', value: 'bokeh' }, { name: 'Neon', value: 'neon' },
        { name: 'Clouds', value: 'clouds' }, { name: 'Wood', value: 'wood' },
        { name: 'Marble', value: 'marble' }, { name: 'Paper', value: 'paper' }
      ]
    };

    function renderBackgrounds(tab) {
      bgGrid.innerHTML = '';
      backgrounds[tab].forEach(bg => {
        const div = document.createElement('div');
        div.className = 'bg-option';
        if (selectedBgType === bg.type || (selectedBgValue === bg.value && bg.type !== 'none')) div.classList.add('selected');
        div.dataset.type = bg.type || 'color';
        div.dataset.value = JSON.stringify(bg.value);
        
        if (bg.value === null) {
          div.style.background = `linear-gradient(135deg, #f3e8ff 25%, #e9d5ff 25%, #e9d5ff 50%, #f3e8ff 50%, #f3e8ff 75%, #e9d5ff 75%, #e9d5ff 100%)`;
          div.style.backgroundSize = '20px 20px';
        } else if (typeof bg.value === 'string' && bg.value.startsWith('#')) {
          div.style.background = bg.value;
        } else if (Array.isArray(bg.value)) {
          div.style.background = `linear-gradient(135deg, ${bg.value.join(', ')})`;
        } else {
          div.style.background = generateSceneBackground(bg.value);
        }
        
        const label = document.createElement('span');
        label.className = 'bg-name';
        label.textContent = bg.name;
        div.appendChild(label);
        
        div.addEventListener('click', () => selectBackground(bg.type || 'color', bg.value));
        bgGrid.appendChild(div);
      });
    }

    function generateSceneBackground(type) {
      const scenes = {
        studio: 'linear-gradient(180deg, #f8fafc 0%, #cbd5e1 100%)', garden: 'linear-gradient(180deg, #bbf7d0 0%, #166534 100%)',
        cafe: 'linear-gradient(135deg, #d4a373 0%, #faedcd 100%)', beach: 'linear-gradient(180deg, #7dd3fc 0%, #fcd34d 60%, #fff 100%)',
        city: 'linear-gradient(135deg, #1e293b 0%, #475569 100%)', space: 'radial-gradient(circle, #312e81 0%, #020617 100%)',
        bokeh: 'radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(147,51,234,0.5) 50%, rgba(30,27,75,1) 100%)',
        neon: 'linear-gradient(45deg, #f43f5e, #8b5cf6, #06b6d4)', clouds: 'linear-gradient(180deg, #1e3a8a 0%, #93c5fd 50%, #ffffff 100%)',
        wood: 'repeating-linear-gradient(90deg, #854d0e 0%, #a16207 5%, #713f12 10%, #854d0e 15%)',
        marble: 'linear-gradient(45deg, #f8fafc 25%, #e2e8f0 25%, #e2e8f0 50%, #f8fafc 50%, #f8fafc 75%, #e2e8f0 75%)',
        paper: 'linear-gradient(0deg, #f8fafc 0%, #f1f5f9 100%)'
      };
      return scenes[type] || '#e5e7eb';
    }

    function selectBackground(type, value) {
      selectedBgType = type;
      selectedBgValue = value;
      document.querySelectorAll('.bg-option').forEach(el => {
        el.classList.remove('selected');
        const v = JSON.parse(el.dataset.value);
        if ((type === 'none' && v === null) || (JSON.stringify(v) === JSON.stringify(value))) el.classList.add('selected');
      });

      if (type === 'none' && !foregroundImage) return;
      renderComposite();
      updateSteps(type === 'none' ? 2 : 3);
      updateStatus(type === 'none' ? 'Transparent' : 'BG Applied', 'success');
    }

    function renderComposite() {
      if (!foregroundImage) return;
      compositeCanvas.width = foregroundImage.naturalWidth;
      compositeCanvas.height = foregroundImage.naturalHeight;

      if (selectedBgType !== 'none') {
        if (typeof selectedBgValue === 'string' && selectedBgValue.startsWith('#')) {
          ctx.fillStyle = selectedBgValue;
          ctx.fillRect(0, 0, compositeCanvas.width, compositeCanvas.height);
        } else if (Array.isArray(selectedBgValue)) {
          const grad = ctx.createLinearGradient(0, 0, compositeCanvas.width, compositeCanvas.height);
          grad.addColorStop(0, selectedBgValue[0]);
          grad.addColorStop(1, selectedBgValue[1]);
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, compositeCanvas.width, compositeCanvas.height);
        } else {
          const colors = {
            studio: ['#f8fafc','#cbd5e1'], garden: ['#bbf7d0','#166534'], cafe: ['#d4a373','#faedcd'],
            beach: ['#7dd3fc','#fcd34d'], city: ['#1e293b','#475569'], space: ['#312e81','#020617'],
            bokeh: ['#ffffff','#9333ea'], neon: ['#f43f5e','#06b6d4'], clouds: ['#1e3a8a','#ffffff'],
            wood: ['#854d0e','#a16207'], marble: ['#f8fafc','#e2e8f0'], paper: ['#f8fafc','#f1f5f9']
          };
          const c = colors[selectedBgValue] || ['#ccc','#888'];
          const grad = ctx.createLinearGradient(0, 0, compositeCanvas.width, compositeCanvas.height);
          grad.addColorStop(0, c[0]); grad.addColorStop(1, c[1]);
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, compositeCanvas.width, compositeCanvas.height);
        }
      }
      ctx.drawImage(foregroundImage, 0, 0, compositeCanvas.width, compositeCanvas.height);

      previewImg.classList.add('hidden');
      compositeCanvas.style.display = 'block';
      downloadBtn.disabled = false;
      if (selectedBgType !== 'none') updateSteps(3);
    }

    function downloadFinal() {
      if (!foregroundImage) return;
      renderComposite();
      const link = document.createElement('a');
      link.download = `Hiruzz_${currentFile.name.replace(/\.[^/.]+$/, "")}.png`;
      link.href = compositeCanvas.toDataURL('image/png', 1.0);
      link.click();
      updateSteps(4);
    }

    function resetWorkspace() {
      fileInput.value = '';
      currentFile = null;
      foregroundImage = null;
      selectedBgType = 'none';
      selectedBgValue = null;
      previewImg.src = '';
      previewImg.classList.remove('hidden');
      compositeCanvas.style.display = 'none';
      uploadZone.classList.remove('hidden');
      previewArea.style.display = 'none';
      processBtn.disabled = true;
      processBtn.classList.remove('hidden');
      bgPicker.classList.add('hidden');
      downloadBtn.disabled = true;
      resetBtn.style.display = 'none';
      updateStatus('Ready', 'default');
      updateSteps(1);
    }

    function updateSteps(current) {
      for (let i = 1; i <= 4; i++) {
        const el = document.getElementById(`step-${i}`);
        el.className = 'step';
        if (i < current) el.classList.add('completed');
        if (i === current) el.classList.add('active');
      }
    }

    function updateStatus(text, type) {
      statusBadge.textContent = text;
      statusBadge.className = 'status-badge';
      if (type === 'success') statusBadge.classList.add('success');
      if (type === 'error') statusBadge.classList.add('error');
    }
  </script>
</body>
</html>
