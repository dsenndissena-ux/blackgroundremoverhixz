<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClearCut AI | Background Remover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: #111827;
      --bg-card: #1f2937;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #374151;
      --success: #10b981;
      --error: #ef4444;
      --glass: rgba(31, 41, 55, 0.6);
      --shadow: 0 10px 30px rgba(0,0,0,0.5);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(circle at 10% 20%, rgba(59,130,246,0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(139,92,246,0.15) 0%, transparent 40%);
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--glass);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo svg { width: 24px; height: 24px; fill: currentColor; }

    .container {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      width: 100%;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2rem;
      align-items: start;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 4rem 2rem;
      text-align: center;
      background: var(--bg-card);
      transition: var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.1);
      transform: translateY(-2px);
    }

    .upload-zone svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      color: var(--text-secondary);
    }

    .upload-title { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .upload-sub { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .upload-btn {
      background: var(--accent);
      color: white;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }
    .upload-btn:hover { background: var(--accent-hover); }

    .preview-area {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      display: none;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .canvas-container {
      position: relative;
      width: 100%;
      height: 500px;
      background-image: linear-gradient(45deg, #2a3240 25%, transparent 25%), 
                        linear-gradient(-45deg, #2a3240 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #2a3240 75%), 
                        linear-gradient(-45deg, transparent 75%, #2a3240 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #preview-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: opacity 0.5s ease;
    }

    .loader {
      position: absolute;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      background: rgba(17, 24, 39, 0.85);
      padding: 1.5rem 2.5rem;
      border-radius: 12px;
      backdrop-filter: blur(4px);
    }
    .loader-dots { display: flex; gap: 8px; }
    .loader-dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.4s infinite ease-in-out both;
    }
    .loader-dot:nth-child(1) { animation-delay: -0.32s; }
    .loader-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 1.25rem;
      border: 1px solid var(--border);
    }

    .panel h3 { font-size: 1rem; margin-bottom: 0.75rem; }
    .panel p { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.5; }

    .action-btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-secondary { background: var(--border); color: var(--text-primary); }
    .btn-secondary:hover:not(:disabled) { background: #4b5563; }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      background: rgba(245, 158, 11, 0.2);
      color: var(--text-secondary);
      border: 1px solid rgba(245, 158, 11, 0.3);
      transition: var(--transition);
    }
    .status-badge.success { background: rgba(16, 185, 129, 0.2); color: var(--success); border-color: rgba(16, 185, 129, 0.3); }
    .status-badge.error { background: rgba(239, 68, 68, 0.2); color: var(--error); border-color: rgba(239, 68, 68, 0.3); }

    .hidden { display: none !important; }

    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; }
      .canvas-container { height: 350px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      ClearCut AI
    </div>
    <div class="status-badge" id="status-badge">Ready</div>
  </header>

  <div class="container">
    <div class="workspace">
      <main class="main-area">
        <div class="upload-zone" id="upload-zone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          <div class="upload-title">Drag & drop your image here</div>
          <div class="upload-sub">Supports JPG, PNG, WEBP (Max 10MB)</div>
          <button class="upload-btn">Browse Files</button>
          <input type="file" id="file-input" accept="image/*" hidden>
        </div>

        <div class="preview-area" id="preview-area">
          <div class="preview-header">
            <h2>Preview Workspace</h2>
            <span id="file-name" style="color: var(--text-secondary); font-size: 0.85rem;"></span>
          </div>
          <div class="canvas-container">
            <div class="loader" id="loader">
              <div class="loader-dots">
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
              </div>
              <span style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 8px;">AI Processing...</span>
            </div>
            <img id="preview-img" src="" alt="Image preview">
          </div>
        </div>
      </main>

      <aside class="controls">
        <div class="panel">
          <h3>🎯 Actions</h3>
          <p>Upload an image. Our AI will instantly isolate the subject and remove the background.</p>
        </div>
        
        <button class="action-btn btn-primary" id="process-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          Remove Background
        </button>

        <button class="action-btn btn-secondary" id="download-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Download PNG
        </button>

        <button class="action-btn btn-secondary" id="reset-btn" style="display: none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
          Reset & Upload New
        </button>
      </aside>
    </div>
  </div>

  <script>
    // DOM Elements
    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');
    const previewArea = document.getElementById('preview-area');
    const previewImg = document.getElementById('preview-img');
    const fileNameDisplay = document.getElementById('file-name');
    const processBtn = document.getElementById('process-btn');
    const downloadBtn = document.getElementById('download-btn');
    const resetBtn = document.getElementById('reset-btn');
    const loader = document.getElementById('loader');
    const statusBadge = document.getElementById('status-badge');

    let currentFile = null;
    let processedBlob = null;

    // Event Listeners
    uploadZone.addEventListener('click', () => fileInput.click());
    
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      uploadZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

    ['dragenter', 'dragover'].forEach(eventName => {
      uploadZone.addEventListener(eventName, () => uploadZone.classList.add('drag-over'));
    });

    ['dragleave', 'drop'].forEach(eventName => {
      uploadZone.addEventListener(eventName, () => uploadZone.classList.remove('drag-over'));
    });

    uploadZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
    processBtn.addEventListener('click', processImage);
    downloadBtn.addEventListener('click', downloadImage);
    resetBtn.addEventListener('click', resetWorkspace);

    function handleFiles(files) {
      if (!files.length) return;
      const file = files[0];
      if (!file.type.startsWith('image/')) {
        alert('Please upload a valid image file (JPG, PNG, WEBP).');
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        alert('File size must be under 10MB.');
        return;
      }

      currentFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        fileNameDisplay.textContent = file.name;
        uploadZone.classList.add('hidden');
        previewArea.style.display = 'block';
        processBtn.disabled = false;
        updateStatus('Image Loaded', 'default');
      };
      reader.readAsDataURL(file);
    }

    async function processImage() {
      if (!currentFile) return;

      processBtn.disabled = true;
      loader.style.display = 'flex';
      previewImg.style.opacity = '0.4';
      updateStatus('Processing AI...', 'default');

      const formData = new FormData();
      formData.append('image_file', currentFile);
      formData.append('size', 'auto');

      try {
        const response = await fetch('https://api.remove.bg/v1.0/removebg', {
          method: 'POST',
          headers: { 'X-Api-Key': 'DsU8jeLZp4w2uSayJ9frLLNs' },
          body: formData
        });

        if (!response.ok) {
          let errorMsg = `API Error: ${response.status}`;
          try {
            const errData = await response.json();
            errorMsg = errData.errors?.[0]?.title || errorMsg;
          } catch {}
          throw new Error(errorMsg);
        }

        processedBlob = await response.blob();
        previewImg.src = URL.createObjectURL(processedBlob);
        previewImg.style.opacity = '1';
        
        updateStatus('Background Removed ✅', 'success');
        downloadBtn.disabled = false;
        resetBtn.style.display = 'flex';
      } catch (error) {
        console.error('Processing failed:', error);
        previewImg.style.opacity = '1';
        updateStatus(`Failed: ${error.message}`, 'error');
        alert(`❌ Processing failed:\n${error.message}`);
      } finally {
        loader.style.display = 'none';
        processBtn.disabled = false;
      }
    }

    function downloadImage() {
      if (!processedBlob) return;
      const link = document.createElement('a');
      link.download = `clearcut_${currentFile.name.replace(/\.[^/.]+$/, "")}.png`;
      link.href = URL.createObjectURL(processedBlob);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function resetWorkspace() {
      fileInput.value = '';
      currentFile = null;
      processedBlob = null;
      previewImg.src = '';
      uploadZone.classList.remove('hidden');
      previewArea.style.display = 'none';
      processBtn.disabled = true;
      downloadBtn.disabled = true;
      resetBtn.style.display = 'none';
      updateStatus('Ready', 'default');
    }

    function updateStatus(text, type) {
      statusBadge.textContent = text;
      statusBadge.className = 'status-badge';
      if (type === 'success') statusBadge.classList.add('success');
      if (type === 'error') statusBadge.classList.add('error');
    }
  </script>
</body>
</html>
